name: CI

on:
  push:
  pull_request:
  schedule:
    # Weekly Arch smoke (Sunday 06:00 UTC)
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu:
    name: ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install fish
        run: |
          sudo apt-get update
          sudo apt-get install -y fish curl jq findutils coreutils grep

      - name: Cache fishcheck
        uses: actions/cache@v5
        id: fishcheck-cache
        with:
          path: ~/.local/bin/fishcheck
          key: fishcheck-v1

      - name: Install fishcheck
        if: steps.fishcheck-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/mattmc3/fishcheck ~/.local/bin/fishcheck

      - name: Add fishcheck to PATH
        run: echo "$HOME/.local/bin/fishcheck" >> "$GITHUB_PATH"

      - name: Lint Fish scripts
        run: fish lint.fish

      - name: Run test suite
        run: fish tests/run-all.fish

  arch:
    name: arch
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: pacman -Sy --noconfirm fish curl jq findutils coreutils grep git

      - name: Cache fishcheck
        uses: actions/cache@v5
        id: fishcheck-cache
        with:
          path: ~/.local/bin/fishcheck
          key: fishcheck-v1

      - name: Install fishcheck
        if: steps.fishcheck-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/mattmc3/fishcheck ~/.local/bin/fishcheck

      - name: Add fishcheck to PATH
        run: echo "$HOME/.local/bin/fishcheck" >> "$GITHUB_PATH"

      - name: Lint Fish scripts
        run: fish lint.fish

      - name: Run test suite
        run: fish tests/run-all.fish
